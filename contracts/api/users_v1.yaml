openapi: "3.0.3"
info:
  title: Users API
  version: "1.0.0"
  description: >
    User management API – version 1.
    Fields marked with x-deprecated will be removed in a future version.

servers:
  - url: /api/v1
    description: Version 1 base path

paths:
  /users:
    get:
      operationId: listUsersV1
      summary: List all users
      tags: [users]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending]
        - name: plan
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListV1"
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      operationId: createUserV1
      summary: Create a new user
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequestV1"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserV1"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: getUserV1
      summary: Get a user by ID
      tags: [users]
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserV1"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateUserV1
      summary: Update a user
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequestV1"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserV1"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteUserV1
      summary: Delete a user
      tags: [users]
      responses:
        "204":
          description: User deleted
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    UserV1:
      type: object
      required:
        - id
        - first_name
        - last_name
        - email
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Jane
        last_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Doe
        email:
          type: string
          format: email
          example: jane.doe@example.com
        phone:
          type: string
          pattern: '^\+?[1-9]\d{1,14}$'
          example: "+14155552671"
          nullable: true
        status:
          type: string
          enum: [active, inactive, pending, suspended]
          example: active
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
          example: free
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    CreateUserRequestV1:
      type: object
      required:
        - first_name
        - last_name
        - email
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
          default: free

    UpdateUserRequestV1:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, suspended]
        plan:
          type: string
          enum: [free, starter, pro, enterprise]

    UserListV1:
      type: object
      required:
        - items
        - total
        - limit
        - offset
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserV1"
        total:
          type: integer
          example: 42
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
